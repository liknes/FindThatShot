ShortDescription: Catalog, tag, and review a large local video archive across internal and external drives — without ever moving or modifying the source files.
Description: |-
  Find That Shot is a Windows desktop app for organizing a large local video
  archive across internal and external drives. Source video files are never
  moved, renamed, deleted, or modified — it only catalogs them, generates
  thumbnails, and stores searchable metadata, tags, notes, ratings, and workflow
  status in its own SQLite catalog.

  Highlights include a fast thumbnail gallery, in-app playback (double-click to
  play) with previous/next navigation, number-key tag hotkeys for review, saved
  searches, and first-class support for DJI drone footage — extracting GPS
  geotags and drawing full flight paths with live drone position on an offline
  map during playback.
