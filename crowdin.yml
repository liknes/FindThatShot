#
# Crowdin ↔ GitHub integration configuration for Find That Shot.
#
# After this file is on your default branch, open your Crowdin project →
# Integrations → GitHub → Edit and confirm the configuration file path is
# crowdin.yml. Use "Source and translation files" sync mode.
#
# Docs: https://support.crowdin.com/configuration-file/
#

files:
  - source: /src/VideoArchiveManager.App/Localization/Strings.resx
    translation: /src/VideoArchiveManager.App/Localization/Strings.%locale%.resx
    type: resx
    # Keep .NET culture names aligned with existing satellite resources (nb-NO).
    languages_mapping:
      nb: nb-NO
      no: nb-NO
